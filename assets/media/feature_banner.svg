<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e676"/>
      <stop offset="100%" stop-color="#00bcd4"/>
    </linearGradient>
    <style>
      .main-title { fill: #ffffff; font-family: 'SF Pro Display', 'Segoe UI', sans-serif; font-size: 32px; font-weight: bold; }
      .sub-title { fill: url(#accent); font-family: 'SF Pro Display', 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; }
      .desc { fill: #9e9e9e; font-family: 'SF Pro', 'Segoe UI', sans-serif; font-size: 13px; }
      .tag { rx: 10; }
      .tag-text { fill: #ffffff; font-family: 'SF Pro', 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; }
      .icon-circle { stroke-width: 2; fill: none; }
      .icon-text { fill: #ffffff; font-family: 'SF Pro', sans-serif; font-size: 28px; }
      .feature-title { fill: #ffffff; font-family: 'SF Pro', sans-serif; font-size: 12px; font-weight: 600; }
      .feature-desc { fill: #757575; font-family: 'SF Pro', sans-serif; font-size: 10px; }
      .divider { stroke: #37474f; stroke-width: 1; }
    </style>
  </defs>

  <rect fill="url(#bg-grad)" width="900" height="300" rx="12"/>

  <!-- Accent line at top -->
  <rect fill="url(#accent)" x="0" y="0" width="900" height="3" rx="1"/>

  <!-- Logo area -->
  <text class="main-title" x="40" y="55">vision_ai</text>
  <text class="sub-title" x="40" y="82">On-Device Vision Intelligence for Flutter</text>
  <text class="desc" x="40" y="105">Real-time hand gesture recognition + facial emotion detection at 25-30 FPS.</text>
  <text class="desc" x="40" y="120">Zero cloud dependencies. Android + iOS.</text>

  <!-- Tags -->
  <rect class="tag" x="40" y="135" width="75" height="22" fill="#1b5e20"/>
  <text class="tag-text" x="77" y="150" text-anchor="middle">MediaPipe</text>

  <rect class="tag" x="125" y="135" width="60" height="22" fill="#0d47a1"/>
  <text class="tag-text" x="155" y="150" text-anchor="middle">ML Kit</text>

  <rect class="tag" x="195" y="135" width="55" height="22" fill="#b71c1c"/>
  <text class="tag-text" x="222" y="150" text-anchor="middle">TFLite</text>

  <rect class="tag" x="260" y="135" width="65" height="22" fill="#4a148c"/>
  <text class="tag-text" x="292" y="150" text-anchor="middle">On-Device</text>

  <!-- Divider -->
  <line class="divider" x1="40" y1="175" x2="360" y2="175"/>

  <!-- Feature grid -->
  <!-- Row 1 -->
  <circle class="icon-circle" cx="58" cy="200" r="14" stroke="#00e676"/>
  <text class="icon-text" x="58" y="207" text-anchor="middle" font-size="16">✋</text>
  <text class="feature-title" x="80" y="196">13 Gestures</text>
  <text class="feature-desc" x="80" y="210">8 built-in + 5 custom</text>

  <circle class="icon-circle" cx="218" cy="200" r="14" stroke="#00bcd4"/>
  <text class="icon-text" x="218" y="207" text-anchor="middle" font-size="16">😊</text>
  <text class="feature-title" x="240" y="196">7 Emotions</text>
  <text class="feature-desc" x="240" y="210">Real-time classification</text>

  <!-- Row 2 -->
  <circle class="icon-circle" cx="58" cy="245" r="14" stroke="#ff9800"/>
  <text class="icon-text" x="58" y="252" text-anchor="middle" font-size="16">👁</text>
  <text class="feature-title" x="80" y="241">Blink + Nod</text>
  <text class="feature-desc" x="80" y="255">Head gesture detection</text>

  <circle class="icon-circle" cx="218" cy="245" r="14" stroke="#ab47bc"/>
  <text class="icon-text" x="218" y="252" text-anchor="middle" font-size="16">🎯</text>
  <text class="feature-title" x="240" y="241">Attention Score</text>
  <text class="feature-desc" x="240" y="255">Eye + orientation + stability</text>

  <!-- Right side: hand skeleton mini -->
  <g transform="translate(500, 20) scale(0.55)">
    <!-- Mini hand skeleton -->
    <circle fill="#ff1744" cx="250" cy="420" r="5"/>
    <!-- Thumb -->
    <line stroke="#00e676" stroke-width="2" x1="250" y1="420" x2="205" y2="390"/>
    <line stroke="#00e676" stroke-width="2" x1="205" y1="390" x2="175" y2="350"/>
    <line stroke="#00e676" stroke-width="2" x1="175" y1="350" x2="155" y2="310"/>
    <line stroke="#00e676" stroke-width="2" x1="155" y1="310" x2="140" y2="275"/>
    <circle fill="#ff1744" cx="205" cy="390" r="3"/>
    <circle fill="#ff1744" cx="175" cy="350" r="3"/>
    <circle fill="#ff1744" cx="155" cy="310" r="3"/>
    <circle fill="#ff1744" cx="140" cy="275" r="4"/>
    <!-- Index -->
    <line stroke="#00e676" stroke-width="2" x1="250" y1="420" x2="220" y2="320"/>
    <line stroke="#00e676" stroke-width="2" x1="220" y1="320" x2="210" y2="250"/>
    <line stroke="#00e676" stroke-width="2" x1="210" y1="250" x2="205" y2="200"/>
    <line stroke="#00e676" stroke-width="2" x1="205" y1="200" x2="200" y2="155"/>
    <circle fill="#ff1744" cx="220" cy="320" r="3"/>
    <circle fill="#ff1744" cx="210" cy="250" r="3"/>
    <circle fill="#ff1744" cx="205" cy="200" r="3"/>
    <circle fill="#ff1744" cx="200" cy="155" r="4"/>
    <!-- Middle -->
    <line stroke="#00e676" stroke-width="2" x1="250" y1="420" x2="255" y2="310"/>
    <line stroke="#00e676" stroke-width="2" x1="255" y1="310" x2="258" y2="235"/>
    <line stroke="#00e676" stroke-width="2" x1="258" y1="235" x2="260" y2="180"/>
    <line stroke="#00e676" stroke-width="2" x1="260" y1="180" x2="262" y2="135"/>
    <circle fill="#ff1744" cx="255" cy="310" r="3"/>
    <circle fill="#ff1744" cx="258" cy="235" r="3"/>
    <circle fill="#ff1744" cx="260" cy="180" r="3"/>
    <circle fill="#ff1744" cx="262" cy="135" r="4"/>
    <!-- Ring -->
    <line stroke="#00e676" stroke-width="2" x1="250" y1="420" x2="290" y2="315"/>
    <line stroke="#00e676" stroke-width="2" x1="290" y1="315" x2="300" y2="245"/>
    <line stroke="#00e676" stroke-width="2" x1="300" y1="245" x2="305" y2="195"/>
    <line stroke="#00e676" stroke-width="2" x1="305" y1="195" x2="310" y2="155"/>
    <circle fill="#ff1744" cx="290" cy="315" r="3"/>
    <circle fill="#ff1744" cx="300" cy="245" r="3"/>
    <circle fill="#ff1744" cx="305" cy="195" r="3"/>
    <circle fill="#ff1744" cx="310" cy="155" r="4"/>
    <!-- Pinky -->
    <line stroke="#00e676" stroke-width="2" x1="250" y1="420" x2="320" y2="330"/>
    <line stroke="#00e676" stroke-width="2" x1="320" y1="330" x2="335" y2="270"/>
    <line stroke="#00e676" stroke-width="2" x1="335" y1="270" x2="345" y2="225"/>
    <line stroke="#00e676" stroke-width="2" x1="345" y1="225" x2="350" y2="190"/>
    <circle fill="#ff1744" cx="320" cy="330" r="3"/>
    <circle fill="#ff1744" cx="335" cy="270" r="3"/>
    <circle fill="#ff1744" cx="345" cy="225" r="3"/>
    <circle fill="#ff1744" cx="350" cy="190" r="4"/>
    <!-- Palm -->
    <line stroke="#00e676" stroke-width="1.5" opacity="0.5" x1="220" y1="320" x2="255" y2="310"/>
    <line stroke="#00e676" stroke-width="1.5" opacity="0.5" x1="255" y1="310" x2="290" y2="315"/>
    <line stroke="#00e676" stroke-width="1.5" opacity="0.5" x1="290" y1="315" x2="320" y2="330"/>
  </g>

  <!-- Right side: face mini -->
  <g transform="translate(660, 30) scale(0.48)">
    <!-- Face box -->
    <rect fill="none" stroke="#00bcd4" stroke-width="2.5" x="170" y="130" width="160" height="200" rx="6"/>
    <!-- Face contour -->
    <path fill="none" stroke="#66bb6a" stroke-width="1.5" d="M250,140 C290,140 330,170 330,230 C330,290 310,330 280,340 C260,350 240,350 220,340 C190,330 170,290 170,230 C170,170 210,140 250,140"/>
    <!-- Eyes -->
    <ellipse fill="none" stroke="#66bb6a" stroke-width="1.5" cx="215" cy="205" rx="18" ry="10"/>
    <ellipse fill="none" stroke="#66bb6a" stroke-width="1.5" cx="285" cy="205" rx="18" ry="10"/>
    <!-- Eyebrows -->
    <path fill="none" stroke="#66bb6a" stroke-width="1.5" d="M195,185 C205,175 220,172 235,178"/>
    <path fill="none" stroke="#66bb6a" stroke-width="1.5" d="M265,178 C280,172 295,175 305,185"/>
    <!-- Nose -->
    <path fill="none" stroke="#66bb6a" stroke-width="1.5" d="M250,195 L248,225 L245,245"/>
    <path fill="none" stroke="#66bb6a" stroke-width="1.5" d="M232,248 C240,255 260,255 268,248"/>
    <!-- Mouth -->
    <path fill="none" stroke="#66bb6a" stroke-width="1.5" d="M222,275 C235,268 250,265 265,268 C278,275 278,275 278,275"/>
    <path fill="none" stroke="#66bb6a" stroke-width="1.5" d="M222,275 C235,290 265,290 278,275"/>
    <!-- Landmarks -->
    <circle fill="#ff9800" cx="215" cy="205" r="4"/>
    <circle fill="#ff9800" cx="285" cy="205" r="4"/>
    <circle fill="#ff9800" cx="250" cy="240" r="4"/>
    <circle fill="#ff9800" cx="222" cy="275" r="4"/>
    <circle fill="#ff9800" cx="278" cy="275" r="4"/>
    <circle fill="#ff9800" cx="250" cy="290" r="4"/>
  </g>

  <!-- Version badge -->
  <rect fill="#37474f" x="810" y="270" width="70" height="20" rx="10"/>
  <text fill="#e0e0e0" font-family="'SF Mono', monospace" font-size="10" x="845" y="284" text-anchor="middle">v0.1.0</text>
</svg>