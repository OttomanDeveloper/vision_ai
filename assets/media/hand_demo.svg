<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="skin" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8b89d"/>
      <stop offset="100%" stop-color="#c4916e"/>
    </radialGradient>
    <radialGradient id="palm-shade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a082"/>
      <stop offset="80%" stop-color="#b8845c"/>
    </radialGradient>
    <linearGradient id="bg-hand" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hand-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect fill="url(#bg-hand)" width="1080" height="1080"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(108,0)" />
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(216,0)" />
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(324,0)" />
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(432,0)" />
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(540,0)" />
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(648,0)" />
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(756,0)" />
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(864,0)" />
    <line x1="0" y1="0" x2="0" y2="1080" stroke="#fff" stroke-width="1" transform="translate(972,0)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,108)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,216)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,324)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,432)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,540)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,648)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,756)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,864)" />
    <line x1="0" y1="0" x2="1080" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,972)" />
  </g>

  <!-- ============ REALISTIC HAND (open palm, peace sign) ============ -->
  <g filter="url(#hand-shadow)">
    <!-- Palm base -->
    <path fill="url(#palm-shade)" d="
      M440,820 C420,780 400,720 395,660
      C390,620 400,580 415,540
      L420,500 L430,460
      C435,440 445,430 455,435
      C465,440 465,460 460,480
      L450,530
      L455,460 L465,380 L475,310
      C478,290 490,280 502,285
      C514,290 516,305 513,325
      L500,410 L495,460
      L510,370 L525,290 L540,220
      C543,200 555,192 567,198
      C579,204 582,220 578,240
      L560,330 L545,410 L535,460
      L555,380 L575,305 L588,250
      C592,232 604,226 615,233
      C626,240 627,256 622,275
      L600,370 L580,440 L565,490
      L588,420 L610,360 L625,320
      C630,305 642,300 652,308
      C662,316 662,332 656,350
      L630,420 L600,490 L575,540
      C555,580 545,620 540,660
      C535,720 520,780 500,820
      Z
    "/>

    <!-- Palm crease lines -->
    <path fill="none" stroke="#a0704a" stroke-width="1.5" opacity="0.4" d="M430,620 C460,590 510,585 560,600"/>
    <path fill="none" stroke="#a0704a" stroke-width="1.5" opacity="0.3" d="M435,660 C470,640 520,635 555,650"/>
    <path fill="none" stroke="#a0704a" stroke-width="1.2" opacity="0.25" d="M445,700 C475,690 515,688 545,695"/>

    <!-- Finger segment shading for depth -->
    <!-- Thumb inner shadow -->
    <path fill="#a0704a" opacity="0.15" d="M420,500 L430,460 C435,440 445,430 450,435 L460,480 L450,530 Z"/>
    <!-- Index inner shadow -->
    <path fill="#a0704a" opacity="0.12" d="M465,380 L475,310 C478,290 490,280 500,285 L500,410 L495,460 Z"/>
    <!-- Middle inner shadow -->
    <path fill="#a0704a" opacity="0.12" d="M525,290 L540,220 C543,200 555,192 565,198 L560,330 L545,410 Z"/>
    <!-- Ring inner shadow -->
    <path fill="#a0704a" opacity="0.12" d="M575,305 L588,250 C592,232 604,226 613,233 L600,370 L580,440 Z"/>
    <!-- Pinky inner shadow -->
    <path fill="#a0704a" opacity="0.12" d="M610,360 L625,320 C630,305 642,300 650,308 L630,420 L600,490 Z"/>

    <!-- Knuckle highlights -->
    <ellipse fill="#e8c4aa" opacity="0.3" cx="455" cy="465" rx="12" ry="8"/>
    <ellipse fill="#e8c4aa" opacity="0.3" cx="500" cy="460" rx="12" ry="8"/>
    <ellipse fill="#e8c4aa" opacity="0.3" cx="545" cy="460" rx="12" ry="8"/>
    <ellipse fill="#e8c4aa" opacity="0.3" cx="580" cy="475" rx="12" ry="8"/>
    <ellipse fill="#e8c4aa" opacity="0.3" cx="610" cy="495" rx="10" ry="7"/>

    <!-- Fingernails -->
    <ellipse fill="#d4a88a" stroke="#c09070" stroke-width="0.5" cx="455" cy="437" rx="8" ry="5" transform="rotate(-5,455,437)"/>
    <ellipse fill="#d4a88a" stroke="#c09070" stroke-width="0.5" cx="503" cy="288" rx="8" ry="5" transform="rotate(-2,503,288)"/>
    <ellipse fill="#d4a88a" stroke="#c09070" stroke-width="0.5" cx="565" cy="200" rx="8" ry="5" transform="rotate(2,565,200)"/>
    <ellipse fill="#d4a88a" stroke="#c09070" stroke-width="0.5" cx="615" cy="235" rx="8" ry="5" transform="rotate(5,615,235)"/>
    <ellipse fill="#d4a88a" stroke="#c09070" stroke-width="0.5" cx="650" cy="310" rx="7" ry="5" transform="rotate(8,650,310)"/>
  </g>

  <!-- ============ SKELETON OVERLAY ============ -->
  <!-- 21 landmark positions for open hand -->
  <!-- 0:wrist 1-4:thumb 5-8:index 9-12:middle 13-16:ring 17-20:pinky -->

  <!-- Skeleton lines (green glow) -->
  <g filter="url(#glow-green)" opacity="0.9">
    <!-- Thumb chain: 0→1→2→3→4 -->
    <line x1="470" y1="770" x2="432" y2="660" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="432" y1="660" x2="428" y2="560" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="428" y1="560" x2="440" y2="485" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="440" y1="485" x2="455" y2="437" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Index chain: 0→5→6→7→8 -->
    <line x1="470" y1="770" x2="475" y2="460" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="475" y1="460" x2="490" y2="370" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="490" y1="370" x2="498" y2="320" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="498" y1="320" x2="503" y2="288" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Middle chain: 0→9→10→11→12 -->
    <line x1="470" y1="770" x2="528" y2="460" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="528" y1="460" x2="548" y2="350" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="548" y1="350" x2="558" y2="268" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="558" y1="268" x2="565" y2="200" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Ring chain: 0→13→14→15→16 -->
    <line x1="470" y1="770" x2="572" y2="480" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="572" y1="480" x2="590" y2="390" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="590" y1="390" x2="602" y2="315" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="602" y1="315" x2="615" y2="235" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Pinky chain: 0→17→18→19→20 -->
    <line x1="470" y1="770" x2="605" y2="505" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="605" y1="505" x2="625" y2="430" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="625" y1="430" x2="640" y2="365" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="640" y1="365" x2="650" y2="310" stroke="#00e676" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Palm connections: 5→9→13→17 -->
    <line x1="475" y1="460" x2="528" y2="460" stroke="#00e676" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="528" y1="460" x2="572" y2="480" stroke="#00e676" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="572" y1="480" x2="605" y2="505" stroke="#00e676" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Landmark dots (red glow) -->
  <g filter="url(#glow-red)">
    <!-- Wrist -->
    <circle fill="#ff1744" cx="470" cy="770" r="8"/>
    <!-- Thumb -->
    <circle fill="#ff1744" cx="432" cy="660" r="6"/>
    <circle fill="#ff1744" cx="428" cy="560" r="6"/>
    <circle fill="#ff1744" cx="440" cy="485" r="6"/>
    <circle fill="#ff1744" cx="455" cy="437" r="8"/>
    <!-- Index -->
    <circle fill="#ff1744" cx="475" cy="460" r="6"/>
    <circle fill="#ff1744" cx="490" cy="370" r="6"/>
    <circle fill="#ff1744" cx="498" cy="320" r="6"/>
    <circle fill="#ff1744" cx="503" cy="288" r="8"/>
    <!-- Middle -->
    <circle fill="#ff1744" cx="528" cy="460" r="6"/>
    <circle fill="#ff1744" cx="548" cy="350" r="6"/>
    <circle fill="#ff1744" cx="558" cy="268" r="6"/>
    <circle fill="#ff1744" cx="565" cy="200" r="8"/>
    <!-- Ring -->
    <circle fill="#ff1744" cx="572" cy="480" r="6"/>
    <circle fill="#ff1744" cx="590" cy="390" r="6"/>
    <circle fill="#ff1744" cx="602" cy="315" r="6"/>
    <circle fill="#ff1744" cx="615" cy="235" r="8"/>
    <!-- Pinky -->
    <circle fill="#ff1744" cx="605" cy="505" r="6"/>
    <circle fill="#ff1744" cx="625" cy="430" r="6"/>
    <circle fill="#ff1744" cx="640" cy="365" r="6"/>
    <circle fill="#ff1744" cx="650" cy="310" r="8"/>
  </g>

  <!-- Gesture label -->
  <rect fill="#000" opacity="0.8" x="330" y="100" width="420" height="65" rx="16"/>
  <rect fill="none" stroke="#00e676" stroke-width="2" x="330" y="100" width="420" height="65" rx="16"/>
  <text fill="#00e676" font-family="'SF Pro Display', 'Segoe UI', sans-serif" font-size="36" font-weight="bold" x="540" y="143" text-anchor="middle">OPEN PALM  95%</text>

  <!-- Landmark index labels -->
  <g fill="#ffffff" opacity="0.5" font-family="'SF Mono', 'Consolas', monospace" font-size="14">
    <text x="450" y="788">0</text>
    <text x="412" y="658">1</text>
    <text x="408" y="558">2</text>
    <text x="420" y="483">3</text>
    <text x="440" y="425">4</text>
    <text x="458" y="455">5</text>
    <text x="475" y="365">6</text>
    <text x="482" y="315">7</text>
    <text x="488" y="278">8</text>
    <text x="535" y="455">9</text>
    <text x="555" y="345">10</text>
    <text x="565" y="263">11</text>
    <text x="572" y="193">12</text>
    <text x="578" y="475">13</text>
    <text x="596" y="385">14</text>
    <text x="608" y="310">15</text>
    <text x="622" y="228">16</text>
    <text x="612" y="500">17</text>
    <text x="632" y="425">18</text>
    <text x="647" y="360">19</text>
    <text x="657" y="303">20</text>
  </g>

  <!-- Stats panel -->
  <rect fill="#000" opacity="0.7" x="60" y="850" width="200" height="140" rx="10"/>
  <g fill="#9e9e9e" font-family="'SF Mono', monospace" font-size="13">
    <text x="75" y="878">Inference: <tspan fill="#fff">14ms</tspan></text>
    <text x="75" y="898">Gesture: <tspan fill="#00e676">Open Palm</tspan></text>
    <text x="75" y="918">Confidence: <tspan fill="#fff">95%</tspan></text>
    <text x="75" y="938">Fingers: <tspan fill="#fff">T I M R P</tspan></text>
    <text x="75" y="958">Side: <tspan fill="#fff">Right</tspan></text>
    <text x="75" y="978">Landmarks: <tspan fill="#fff">21</tspan></text>
  </g>

  <!-- Branding -->
  <text fill="#ffffff" font-family="'SF Pro Display', sans-serif" font-size="28" font-weight="bold" x="540" y="1050" text-anchor="middle">vision_ai</text>
  <text fill="#546e7a" font-family="'SF Pro', sans-serif" font-size="14" x="540" y="1070" text-anchor="middle">Real-time Hand Gesture Recognition for Flutter</text>
</svg>
