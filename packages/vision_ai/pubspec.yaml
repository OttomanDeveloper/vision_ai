name: vision_ai
description: On-device hand gesture recognition and facial emotion detection for Flutter. Runs at 25+ FPS with zero cloud dependencies.
version: 0.1.1
homepage: https://github.com/OttomanDeveloper/vision_ai
repository: https://github.com/OttomanDeveloper/vision_ai

environment:
  sdk: ^3.6.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^25.3.0

flutter:
  plugin:
    platforms:
      android:
        package: com.visionai.vision_ai
        pluginClass: VisionAiPlugin
      ios:
        pluginClass: VisionAiPlugin
